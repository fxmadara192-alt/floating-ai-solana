// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Gradle plugin for Android
        classpath "com.android.tools.build:gradle:7.0.2"
    }
}

// All sub-projects/modules carry this configuration.
allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Configuration for the Android application
android {
    compileSdkVersion 31

    defaultConfig {
        applicationId "com.example.floatingaisolana"
        minSdkVersion 21
        targetSdkVersion 31
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}